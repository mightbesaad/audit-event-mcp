# publish.yml — GitHub Actions workflow for @kajaril/audit-event-mcp
# Triggers on a v*.*.* tag push. Builds, tests, runs Biome, and publishes to
# npm with provenance attestation via OIDC. No long-lived npm token required.

name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Build, test, publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm test

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag and package version match: $PKG_VERSION"

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify provenance attestation
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          npm view "$PKG_NAME@$PKG_VERSION" --json | grep -q '"attestations"' || {
            echo "Provenance attestation not found on published package"
            exit 1
          }
          echo "Provenance attestation verified for $PKG_NAME@$PKG_VERSION"
